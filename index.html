  <!-- JSZip -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" integrity="sha512-XMVd28F1oH/O71fzwBnV7HucLxVwtxf26XV8P4wPk26EDFuGW8A+ANQhj5Bz1r0VPG2lmIExtJontHCIWjJoQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <script>
    "use strict";

    // ── Configuration ──
    var CONFIG = {
      canvasHeight: 1200,
      sidePadding: 50,
      imageGap: 0,
      bgColor: "#000000",
      outputFormat: "image/png",
      filePrefix: "triptych_",
      maxFileSize: 50 * 1024 * 1024,
      allowedMimes: ["image/png", "image/jpeg", "image/webp", "image/gif"],
    };

    // ── Security Utilities ──
    var SecurityUtils = {
      sanitizeText: function (input) {
        if (typeof input !== "string") return "";
        return input.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#x27;");
      },
      validateFile: function (file) {
        if (!CONFIG.allowedMimes.includes(file.type)) return "不支援的檔案格式：" + SecurityUtils.sanitizeText(file.type);
        if (file.size > CONFIG.maxFileSize) return "檔案過大（上限 50 MB）：" + SecurityUtils.sanitizeText(file.name);
        return null;
      },
    };

    // ── State ──
    var state = { largeFiles: [], mediumFiles: [], smallFiles: [], canvasBlobs: [] };

    // ── DOM References ──
    var dom = {
      inputLarge: document.getElementById("inputLarge"),
      inputMedium: document.getElementById("inputMedium"),
      inputSmall: document.getElementById("inputSmall"),
      dropZoneLarge: document.getElementById("dropZoneLarge"),
      dropZoneMedium: document.getElementById("dropZoneMedium"),
      dropZoneSmall: document.getElementById("dropZoneSmall"),
      countLarge: document.getElementById("countLarge"),
      countMedium: document.getElementById("countMedium"),
      countSmall: document.getElementById("countSmall"),
      cropTop: document.getElementById("cropTop"),
      cropLeft: document.getElementById("cropLeft"),
      cropRight: document.getElementById("cropRight"),
      cropTopValue: document.getElementById("cropTopValue"),
      cropLeftValue: document.getElementById("cropLeftValue"),
      cropRightValue: document.getElementById("cropRightValue"),
      btnGenerate: document.getElementById("btnGenerate"),
      btnDownload: document.getElementById("btnDownload"),
      btnClear: document.getElementById("btnClear"),
      statusText: document.getElementById("statusText"),
      errorBanner: document.getElementById("errorBanner"),
      errorText: document.getElementById("errorText"),
      gallery: document.getElementById("gallery"),
      loadingOverlay: document.getElementById("loadingOverlay"),
      loadingText: document.getElementById("loadingText"),
    };

    // ── Crop Slider Live Update ──
    function wireCropSlider(slider, display) {
      slider.addEventListener("input", function () {
        display.textContent = slider.value + "%";
      });
    }
    wireCropSlider(dom.cropTop, dom.cropTopValue);
    wireCropSlider(dom.cropLeft, dom.cropLeftValue);
    wireCropSlider(dom.cropRight, dom.cropRightValue);

    // ── Helpers ──

    function sortFilesByName(files) {
      return Array.from(files).sort(function (a, b) {
        return a.name.localeCompare(b.name, undefined, { numeric: true });
      });
    }

    function loadImage(file) {
      return new Promise(function (resolve, reject) {
        var img = new Image();
        img.onload = function () { resolve(img); };
        img.onerror = function () { reject(new Error("無法載入影像：" + file.name)); };
        img.src = URL.createObjectURL(file);
      });
    }

    function updateCount(counterEl, count) {
      if (count > 0) { counterEl.textContent = "已選取 " + count + " 個檔案"; counterEl.classList.remove("hidden"); }
      else { counterEl.classList.add("hidden"); }
    }

    function padIndex(n, width) { return String(n).padStart(width || 3, "0"); }

    function showError(msg) { dom.errorText.textContent = msg; dom.errorBanner.classList.remove("hidden"); dom.errorBanner.classList.add("flex"); }
    function hideError() { dom.errorBanner.classList.add("hidden"); dom.errorBanner.classList.remove("flex"); }

    // ── Drop Zone Wiring ──

    function wireDropZone(dropZone, fileInput, stateKey, counterEl) {
      function handleFiles(fileList) {
        var filtered = Array.from(fileList).filter(function (f) { return f.type.startsWith("image/"); });
        for (var i = 0; i < filtered.length; i++) {
          var err = SecurityUtils.validateFile(filtered[i]);
          if (err) { showError(err); return; }
        }
        hideError();
        if (filtered.length === 0) return;
        state[stateKey] = sortFilesByName(filtered);
        updateCount(counterEl, state[stateKey].length);
      }

      dropZone.addEventListener("click", function () { fileInput.click(); });
      dropZone.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); fileInput.click(); }
      });
      fileInput.addEventListener("change", function () { handleFiles(fileInput.files); });
      dropZone.addEventListener("dragover", function (e) { e.preventDefault(); dropZone.classList.add("drag-over"); });
      dropZone.addEventListener("dragleave", function () { dropZone.classList.remove("drag-over"); });
      dropZone.addEventListener("drop", function (e) {
        e.preventDefault(); dropZone.classList.remove("drag-over"); handleFiles(e.dataTransfer.files);
      });
    }

    wireDropZone(dom.dropZoneLarge, dom.inputLarge, "largeFiles", dom.countLarge);
    wireDropZone(dom.dropZoneMedium, dom.inputMedium, "mediumFiles", dom.countMedium);
    wireDropZone(dom.dropZoneSmall, dom.inputSmall, "smallFiles", dom.countSmall);

    // ── Preprocessing: Rotate 90° CW + User-defined Crop ──

    function preprocessImage(img, cropTopPct, cropLeftPct, cropRightPct) {
      var origW = img.naturalWidth;
      var origH = img.naturalHeight;

      // Step 1: Rotate 90° clockwise — new size: width=origH, height=origW
      var rotCanvas = document.createElement("canvas");
      rotCanvas.width = origH;
      rotCanvas.height = origW;
      var rotCtx = rotCanvas.getContext("2d");
      rotCtx.translate(origH, 0);
      rotCtx.rotate(Math.PI / 2);
      rotCtx.drawImage(img, 0, 0);

      // Step 2: Crop based on user-defined percentages
      var rotW = rotCanvas.width;
      var rotH = rotCanvas.height;
      var cropTop = Math.round(rotH * cropTopPct / 100);
      var cropLeft = Math.round(rotW * cropLeftPct / 100);
      var cropRight = Math.round(rotW * cropRightPct / 100);
      var croppedW = rotW - cropLeft - cropRight;
      var croppedH = rotH - cropTop;

      if (croppedW <= 0 || croppedH <= 0) {
        // Safety: if crop is too aggressive, return original rotated image
        return new Promise(function (resolve) {
          var p = new Image();
          p.onload = function () { resolve(p); };
          p.src = rotCanvas.toDataURL();
        });
      }

      var cropCanvas = document.createElement("canvas");
      cropCanvas.width = croppedW;
      cropCanvas.height = croppedH;
      var cropCtx = cropCanvas.getContext("2d");
      cropCtx.drawImage(rotCanvas, cropLeft, cropTop, croppedW, croppedH, 0, 0, croppedW, croppedH);

      return new Promise(function (resolve) {
        var processed = new Image();
        processed.onload = function () { resolve(processed); };
        processed.src = cropCanvas.toDataURL();
      });
    }

    // ── Canvas Composition ──

    function composeTriptych(imgLarge, imgMedium, imgSmall) {
      var canvasHeight = CONFIG.canvasHeight;
      var sidePadding = CONFIG.sidePadding;
      var imageGap = CONFIG.imageGap;

      function scaledDims(img) {
        var scale = canvasHeight / img.naturalHeight;
        return { w: img.naturalWidth * scale, h: canvasHeight };
      }

      var dimL = scaledDims(imgLarge);
      var dimM = scaledDims(imgMedium);
      var dimS = scaledDims(imgSmall);
      var totalWidth = sidePadding + dimL.w + imageGap + dimM.w + imageGap + dimS.w + sidePadding;

      var canvas = document.createElement("canvas");
      canvas.width = Math.round(totalWidth);
      canvas.height = canvasHeight;

      var ctx = canvas.getContext("2d");
      ctx.fillStyle = CONFIG.bgColor;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      var x = sidePadding;
      ctx.drawImage(imgLarge, x, canvasHeight - dimL.h, dimL.w, dimL.h);
      x += dimL.w + imageGap;
      ctx.drawImage(imgMedium, x, canvasHeight - dimM.h, dimM.w, dimM.h);
      x += dimM.w + imageGap;
      ctx.drawImage(imgSmall, x, canvasHeight - dimS.h, dimS.w, dimS.h);

      return canvas;
    }

    function canvasToBlob(canvas) {
      return new Promise(function (resolve) {
        canvas.toBlob(function (blob) { resolve(blob); }, CONFIG.outputFormat);
      });
    }

    // ── Generate ──

    dom.btnGenerate.addEventListener("click", async function () {
      hideError();
      var largeFiles = state.largeFiles;
      var mediumFiles = state.mediumFiles;
      var smallFiles = state.smallFiles;

      if (largeFiles.length === 0 || mediumFiles.length === 0 || smallFiles.length === 0) {
        showError("請確認三個欄位皆已上傳影像檔案。");
        return;
      }

      if (largeFiles.length !== mediumFiles.length || mediumFiles.length !== smallFiles.length) {
        showError(
          "三個欄位的檔案數量不一致，無法配對。大葉片：" + largeFiles.length +
          " 個、中葉片：" + mediumFiles.length +
          " 個、小葉片：" + smallFiles.length + " 個。"
        );
        return;
      }

      // Read crop values from sliders
      var cropTopPct = parseInt(dom.cropTop.value, 10);
      var cropLeftPct = parseInt(dom.cropLeft.value, 10);
      var cropRightPct = parseInt(dom.cropRight.value, 10);

      // Validate crop sum
      if (cropLeftPct + cropRightPct >= 90) {
        showError("左右裁切合計不可超過 90%。目前：左 " + cropLeftPct + "% + 右 " + cropRightPct + "% = " + (cropLeftPct + cropRightPct) + "%");
        return;
      }
      if (cropTopPct >= 90) {
        showError("上側裁切不可超過 90%。");
        return;
      }

      var totalSets = largeFiles.length;

      dom.loadingOverlay.classList.remove("hidden");
      dom.btnGenerate.disabled = true;
      dom.btnGenerate.classList.add("opacity-50", "cursor-not-allowed");
      dom.gallery.innerHTML = "";
      dom.btnDownload.classList.add("hidden");
      dom.btnClear.classList.add("hidden");
      dom.statusText.classList.add("hidden");
      state.canvasBlobs = [];

      var startTime = performance.now();

      try {
        for (var i = 0; i < totalSets; i++) {
          dom.loadingText.textContent = "正在產出第 " + (i + 1) + " / " + totalSets + " 組組合圖…";

          var rawL = await loadImage(largeFiles[i]);
          var rawM = await loadImage(mediumFiles[i]);
          var rawS = await loadImage(smallFiles[i]);

          var imgL = await preprocessImage(rawL, cropTopPct, cropLeftPct, cropRightPct);
          var imgM = await preprocessImage(rawM, cropTopPct, cropLeftPct, cropRightPct);
          var imgS = await preprocessImage(rawS, cropTopPct, cropLeftPct, cropRightPct);

          var canvas = composeTriptych(imgL, imgM, imgS);
          var blob = await canvasToBlob(canvas);
          state.canvasBlobs.push(blob);

          var wrapper = document.createElement("div");
          wrapper.className = "bg-white rounded-xl shadow p-3 border border-gray-200 fade-in";

          var label = document.createElement("p");
          label.className = "text-xs text-gray-500 mb-2 font-medium";
          label.textContent = "組合 " + padIndex(i + 1);

          var img = document.createElement("img");
          img.src = URL.createObjectURL(blob);
          img.className = "w-full rounded-lg";
          img.alt = "三聯組合圖 " + padIndex(i + 1);
          img.loading = "lazy";

          wrapper.appendChild(label);
          wrapper.appendChild(img);
          dom.gallery.appendChild(wrapper);

          URL.revokeObjectURL(rawL.src);
          URL.revokeObjectURL(rawM.src);
          URL.revokeObjectURL(rawS.src);
        }

        var elapsed = ((performance.now() - startTime) / 1000).toFixed(1);
        dom.statusText.textContent = "已完成 " + totalSets + " 組，耗時 " + elapsed + " 秒";
        dom.statusText.classList.remove("hidden");

        dom.btnDownload.classList.remove("hidden");
        dom.btnClear.classList.remove("hidden");
      } catch (err) {
        showError("產出過程發生錯誤：" + err.message);
      } finally {
        dom.loadingOverlay.classList.add("hidden");
        dom.btnGenerate.disabled = false;
        dom.btnGenerate.classList.remove("opacity-50", "cursor-not-allowed");
      }
    });

    // ── Download ZIP ──

    dom.btnDownload.addEventListener("click", async function () {
      if (state.canvasBlobs.length === 0) return;
      dom.btnDownload.disabled = true;
      dom.btnDownload.textContent = "正在打包中…";

      try {
        var zip = new JSZip();
        state.canvasBlobs.forEach(function (blob, i) {
          zip.file(CONFIG.filePrefix + padIndex(i + 1) + ".png", blob);
        });
        var content = await zip.generateAsync({ type: "blob" });
        var url = URL.createObjectURL(content);
        var a = document.createElement("a");
        a.href = url;
        a.download = "triptych_output.zip";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      } catch (err) {
        showError("打包下載失敗：" + err.message);
      } finally {
        dom.btnDownload.disabled = false;
        dom.btnDownload.textContent = "打包下載（ZIP）";
      }
    });

    // ── Clear All ──

    dom.btnClear.addEventListener("click", function () {
      state.largeFiles = [];
      state.mediumFiles = [];
      state.smallFiles = [];
      state.canvasBlobs = [];
      dom.inputLarge.value = "";
      dom.inputMedium.value = "";
      dom.inputSmall.value = "";
      dom.countLarge.classList.add("hidden");
      dom.countMedium.classList.add("hidden");
      dom.countSmall.classList.add("hidden");
      dom.gallery.innerHTML = "";
      dom.btnDownload.classList.add("hidden");
      dom.btnClear.classList.add("hidden");
      dom.statusText.classList.add("hidden");
      hideError();
    });

    // ── PWA: Service Worker Registration ──
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () {});
      });
    }

    // ── Analytics Placeholder (disabled by default) ──
    var ANALYTICS_ENABLED = false;
    function trackEvent(name, data) {
      if (!ANALYTICS_ENABLED) return;
      try { navigator.sendBeacon("/api/event", JSON.stringify({ event: name, data: data })); } catch (e) {}
    }
  </script>
</body>
</html>
