name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Tailwind CSS
        run: npm install tailwindcss@3

      - name: Create Tailwind config
        run: |
          cat > tailwind.config.js << 'EOF'
          module.exports = {
            content: ["./index.html", "./404.html", "./CHANGELOG.html"],
            theme: { extend: {} },
            plugins: [],
          }
          EOF
          cat > input.css << 'EOF'
          @tailwind base;
          @tailwind components;
          @tailwind utilities;
          EOF

      - name: Compile Tailwind CSS
        run: |
          mkdir -p assets/css
          npx tailwindcss -i input.css -o assets/css/style.css --minify

      - name: Install html-minifier
        run: npm install -g html-minifier-terser

      - name: Prepare dist
        run: |
          mkdir -p dist/assets/css dist/assets/images
          cp assets/css/style.css dist/assets/css/
          cp -r assets/images/* dist/assets/images/ 2>/dev/null || true
          cp manifest.json sw.js robots.txt sitemap.xml dist/ 2>/dev/null || true
          cp LICENSE dist/ 2>/dev/null || true
          cp lighthouserc.json dist/ 2>/dev/null || true

      - name: Minify HTML
        run: |
          for f in index.html 404.html CHANGELOG.html; do
            if [ -f "$f" ]; then
              html-minifier-terser \
                --collapse-whitespace \
                --remove-comments \
                --minify-css true \
                --minify-js true \
                "$f" -o "dist/$f" || cp "$f" "dist/"
            fi
          done

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse audit
        run: |
          lhci autorun \
            --collect.staticDistDir=dist \
            --assert.preset=lighthouse:recommended \
            --assert.assertions.uses-responsive-images=off \
            --assert.assertions.unsized-images=off \
          || echo "::warning::Lighthouse audit had findings"
        continue-on-error: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
